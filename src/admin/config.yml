backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/img"
public_folder: "/assets/img"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Commercial", "Brand Campaign", "Branded Content", "Social Campaign", "Motion Design", "Music Video", "Short Film", "Marketing", "Identity"] }
      - { label: "Project Type", name: "project_type", widget: "select", options: ["video", "gallery"], default: "video", hint: "'video' = main video embed at top. 'gallery' = scrollable image gallery at top." }
      - { label: "Client", name: "client", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image" }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "Video Embed URL", name: "video_url", widget: "string", required: false, hint: "YouTube or Vimeo embed URL (used when Project Type is 'video')" }
      - label: "Hero Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Images shown at top of project page (used when Project Type is 'gallery')"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Alt Text", name: "alt", widget: "string", required: false }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Process Gallery"
        name: "process"
        widget: "list"
        required: false
        hint: "Add images, videos, and descriptions to showcase your process"
        fields:
          - { label: "Title / Caption", name: "caption", widget: "string" }
          - { label: "Description", name: "text", widget: "text", required: false }
          - { label: "Media Type", name: "media_type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Image", name: "image", widget: "image", required: false, hint: "Upload an image (used when Media Type is 'image')" }
          - { label: "Video File (MP4)", name: "video_file", widget: "file", required: false, hint: "Upload an MP4 video (plays on hover)" }
          - { label: "Video Poster / Thumbnail", name: "video_poster", widget: "image", required: false, hint: "Still image shown before video plays" }
          - { label: "Layout", name: "layout", widget: "select", options: ["full", "half"], default: "full", hint: "'full' = full width, 'half' = side-by-side with next item" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", default: 10, hint: "Lower numbers appear first" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Show on homepage and as related project" }
      - { label: "Tags", name: "tags", widget: "list", default: ["project"] }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "src/_data/settings.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string", default: "Pierce Lawson" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Director / Editor / Creative" }
          - { label: "Hero Headline", name: "hero_headline", widget: "string", default: "Every Frame Tells a Story" }
          - { label: "Hero Subtext", name: "hero_sub", widget: "text", default: "Commercials, branded content, and creative media — crafted with intention in Amarillo, TX." }
          - { label: "Email", name: "email", widget: "string", default: "pierce@piercelawson.com" }
          - { label: "About Text", name: "about_text", widget: "markdown" }
          - { label: "Location", name: "location", widget: "string", default: "Amarillo, TX" }
